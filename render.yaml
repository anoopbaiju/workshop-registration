services:
  - type: web
    name: workshop-registration
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: ORG_WHATSAPP_DISPLAY
        value: "+91 95676 02762"
      - key: ORG_WHATSAPP_LINK
        value: https://wa.me/919567602762
